name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ministry_manager
          POSTGRES_USER: ministry
          POSTGRES_PASSWORD: ministry
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build CSS
        run: |
          npm install
          npm run build:css

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: ruff check .

      - name: Migrate
        env:
          DATABASE_URL: postgres://ministry:ministry@localhost:5432/ministry_manager
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret
          DEBUG: "True"
        run: |
          python manage.py create_db
          python manage.py migrate --noinput

      - name: Test
        env:
          DATABASE_URL: postgres://ministry:ministry@localhost:5432/ministry_manager
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret
          DEBUG: "True"
        run: pytest

  deploy:
    needs: test
    if: >-
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      secrets.AZURE_CREDENTIALS != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push image
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}
          docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/ministry-manager:${{ github.sha }} .
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/ministry-manager:${{ github.sha }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          images: ${{ secrets.ACR_NAME }}.azurecr.io/ministry-manager:${{ github.sha }}
