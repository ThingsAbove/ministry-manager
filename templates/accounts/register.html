{% extends "base.html" %}
{% block title %}Register — {{ block.super }}{% endblock %}
{% block content %}
<div class="mx-auto max-w-md">
  <div class="card">
    <h1 class="text-2xl font-bold text-slate-900">Create account</h1>
    <form method="post" class="mt-6 space-y-4">
      {% csrf_token %}
      {% for field in form %}
      <div>
        <label class="block text-sm font-medium text-slate-700">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<p class="mt-1 text-sm text-red-600">{{ field.errors.0 }}</p>{% endif %}
      </div>
      {% endfor %}
      <button type="submit" class="btn-primary w-full">Register</button>
    </form>
  </div>
</div>
{% endblock %}
