{% extends "base.html" %}
{% block title %}Sign in — {{ block.super }}{% endblock %}
{% block content %}
<div class="mx-auto max-w-md">
  <div class="card">
    <h1 class="text-2xl font-bold text-slate-900">Sign in</h1>
    <form method="post" class="mt-6 space-y-4">
      {% csrf_token %}
      {% if form.non_field_errors %}
      <div class="rounded-lg bg-red-50 p-3 text-sm text-red-700">{{ form.non_field_errors }}</div>
      {% endif %}
      <div>
        <label class="block text-sm font-medium text-slate-700">Username</label>
        {{ form.username }}
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700">Password</label>
        {{ form.password }}
      </div>
      <button type="submit" class="btn-primary w-full">Sign in</button>
    </form>
    <p class="mt-4 text-center text-sm text-slate-600">
      No account? <a href="{% url 'accounts:register' %}" class="text-indigo-600 hover:text-indigo-800">Register</a>
    </p>
  </div>
</div>
{% endblock %}
