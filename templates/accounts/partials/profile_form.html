<form method="post"
      hx-post="{% url 'accounts:profile' %}"
      hx-target="#profile-form"
      hx-swap="innerHTML"
      class="card space-y-4">
  {% csrf_token %}
  {% if saved %}
  <p class="rounded-lg bg-green-50 p-3 text-sm text-green-700">Profile saved successfully.</p>
  {% endif %}
  <div class="grid gap-4 sm:grid-cols-2">
    <div>
      <label class="block text-sm font-medium text-slate-700">First name</label>
      {{ form.first_name }}
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700">Last name</label>
      {{ form.last_name }}
    </div>
  </div>
  <div>
    <label class="block text-sm font-medium text-slate-700">Email</label>
    {{ form.email }}
  </div>
  <div>
    <label class="block text-sm font-medium text-slate-700">Phone</label>
    {{ form.phone }}
  </div>
  <div class="space-y-2">
    <p class="text-sm font-medium text-slate-700">Notifications</p>
    <label class="checkbox-row">
      {{ form.email_opt_in }}
      <span>Email notifications</span>
    </label>
    <label class="checkbox-row">
      {{ form.sms_opt_in }}
      <span>SMS notifications</span>
    </label>
  </div>
  <div>
    <label class="block text-sm font-medium text-slate-700">Serving frequency</label>
    {{ form.serving_frequency }}
  </div>
  <div>
    <label class="block text-sm font-medium text-slate-700">Preferred service times</label>
    <div class="checkbox-list mt-2">{{ form.preferred_service_times }}</div>
  </div>
  <div>
    <label class="block text-sm font-medium text-slate-700">Notes</label>
    {{ form.notes }}
  </div>
  <button type="submit" class="btn-primary">Save profile</button>
</form>
