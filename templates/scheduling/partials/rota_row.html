<tr id="rota-row-{{ assignment.pk }}" class="border-b border-slate-100{% if assignment.rsvp and assignment.rsvp.status == 'declined' %} bg-red-50{% endif %}">
  <td class="py-2">{{ assignment.team_role.team.name }} — {{ assignment.team_role.name }}</td>
  <td class="py-2">
    {% include "scheduling/partials/rota_cell.html" with assignment=assignment week_start=week_start %}
  </td>
  <td class="py-2">
    {% include "core/partials/assignment_rsvp_status.html" with assignment=assignment %}
  </td>
</tr>
