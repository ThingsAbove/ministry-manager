<table class="w-full text-sm">
  <thead>
    <tr class="border-b text-left text-slate-500">
      <th class="py-2">Name</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    {% for m in memberships %}
    <tr class="border-b border-slate-100">
      <td class="py-2">{{ m.volunteer.user.display_name }}</td>
      <td class="py-2 text-right">
        <button class="text-red-600 hover:text-red-800"
                hx-post="{% url 'teams:roster' team.pk %}"
                hx-vals='{"action": "remove", "volunteer_id": "{{ m.volunteer.pk }}"}'
                hx-target="#roster-table"
                hx-swap="innerHTML">Remove</button>
      </td>
    </tr>
    {% empty %}
    <tr><td colspan="2" class="py-4 text-slate-500">No members yet.</td></tr>
    {% endfor %}
  </tbody>
</table>
