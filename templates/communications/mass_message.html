{% extends "base.html" %}
{% block title %}Mass Message — {{ block.super }}{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold text-slate-900">Mass Message</h1>
<div class="card mt-6 max-w-lg">
  <form method="post"
        hx-post="{% url 'communications:mass_message' %}"
        hx-target="#mass-message-result"
        hx-swap="innerHTML">
    {% csrf_token %}
    {% for field in form %}
    <div class="mb-4">
      <label class="block text-sm font-medium text-slate-700">{{ field.label }}</label>
      {{ field }}
    </div>
    {% endfor %}
    <button type="submit" class="btn-primary">Send message</button>
  </form>
  <div id="mass-message-result" class="mt-4"></div>
</div>
{% endblock %}
